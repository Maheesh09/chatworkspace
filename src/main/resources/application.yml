spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/chatdb
    username: chat_user
    password: chat_password

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  config:
    import: optional:classpath:application-local.yml